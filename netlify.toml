[build]
  publish = "frontend"
  functions = "netlify/functions"
  # Install root deps (includes all backend packages needed by the function)
  command = "npm install && cd backend && npx prisma generate && cd .."

[build.environment]
  NODE_VERSION = "20"

# Rewrite /api/* → Netlify Function
[[redirects]]
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200

# WhatsApp inbound webhook
[[redirects]]
  from   = "/webhooks/*"
  to     = "/.netlify/functions/api/webhooks/:splat"
  status = 200

# SPA fallback
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[functions]
  # zisi bundles the function with its node_modules (resolves relative requires)
  node_bundler = "zisi"

  [functions.api]
    timeout = 26
    # Explicitly include all required node_modules next to the function
    included_files = ["backend/src/**", "node_modules/**"]

[dev]
  command    = "cd backend && node src/server.js"
  port       = 3001
  targetPort = 3001
  publish    = "frontend"
