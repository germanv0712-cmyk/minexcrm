<!-- Auth bridge: handles real JWT auth and exposes window.MxAuth -->
<script>
window.MxAuth = (() => {
  const ACCESS_KEY  = 'mx_access';
  const REFRESH_KEY = 'mx_refresh';
  const USER_KEY    = 'mx_user';

  function getUser()         { try { return JSON.parse(localStorage.getItem(USER_KEY)); } catch { return null; } }
  function getAccessToken()  { return localStorage.getItem(ACCESS_KEY); }

  function save({ accessToken, refreshToken, user }) {
    localStorage.setItem(ACCESS_KEY,  accessToken);
    localStorage.setItem(REFRESH_KEY, refreshToken);
    localStorage.setItem(USER_KEY, JSON.stringify(user));
  }

  function clear() {
    localStorage.removeItem(ACCESS_KEY);
    localStorage.removeItem(REFRESH_KEY);
    localStorage.removeItem(USER_KEY);
  }

  async function login(email, password, tenantId) {
    const res = await fetch('/api/auth/login', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ email, password, tenantId }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Login failed');
    save(data);
    return data.user;
  }

  async function logout() {
    const refreshToken = localStorage.getItem(REFRESH_KEY);
    const accessToken  = getAccessToken();
    if (refreshToken && accessToken) {
      await fetch('/api/auth/logout', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${accessToken}` },
        body:    JSON.stringify({ refreshToken }),
      }).catch(() => {});
    }
    clear();
  }

  async function apiFetch(url, options = {}) {
    const headers = { 'Content-Type': 'application/json', ...options.headers };
    const token = getAccessToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;

    const res = await fetch(url, { ...options, headers });

    if (res.status === 401) {
      // Try refresh
      const rt = localStorage.getItem(REFRESH_KEY);
      if (!rt) { clear(); window.location.hash = '#/login'; throw new Error('Session expired'); }
      const rfRes = await fetch('/api/auth/refresh', {
        method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ refreshToken: rt }),
      });
      if (!rfRes.ok) { clear(); window.location.hash = '#/login'; throw new Error('Session expired'); }
      const rfData = await rfRes.json();
      localStorage.setItem(ACCESS_KEY,  rfData.accessToken);
      localStorage.setItem(REFRESH_KEY, rfData.refreshToken);
      // Retry
      headers['Authorization'] = `Bearer ${rfData.accessToken}`;
      return fetch(url, { ...options, headers });
    }
    return res;
  }

  return { login, logout, getUser, getAccessToken, apiFetch, clear };
})();
</script>
