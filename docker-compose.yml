version: '3.9'

services:
  # ── PostgreSQL ──────────────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB:       minexcrm
      POSTGRES_USER:     minexcrm
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-minexcrm_dev}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U minexcrm -d minexcrm']
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Redis (optional: for future BullMQ webhook queue) ──────────────────────
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redisdata:/data

  # ── Backend API ─────────────────────────────────────────────────────────────
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV:           production
      PORT:               3001
      DATABASE_URL:       postgresql://minexcrm:${POSTGRES_PASSWORD:-minexcrm_dev}@db:5432/minexcrm
      JWT_SECRET:         ${JWT_SECRET}
      CORS_ORIGIN:        ${CORS_ORIGIN:-http://localhost}
      AWS_REGION:         ${AWS_REGION:-us-east-1}
      AWS_ACCESS_KEY_ID:  ${AWS_ACCESS_KEY_ID}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
      S3_BUCKET:          ${S3_BUCKET}
      WA_VERIFY_TOKEN:    ${WA_VERIFY_TOKEN}
      WA_APP_SECRET:      ${WA_APP_SECRET}
      WA_PHONE_ID:        ${WA_PHONE_ID}
      WA_ACCESS_TOKEN:    ${WA_ACCESS_TOKEN}
    ports:
      - '3001:3001'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: >
      sh -c "npx prisma migrate deploy && npx prisma db seed && node src/server.js"

  # ── Frontend (Nginx) ────────────────────────────────────────────────────────
  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      - api
    ports:
      - '80:80'
      - '443:443'

volumes:
  pgdata:
  redisdata:
